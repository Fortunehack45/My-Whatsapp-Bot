services:
  - type: web
    name: whatsapp-bot
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: OWNER_NUMBER
        sync: false
      - key: PAIRING_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
